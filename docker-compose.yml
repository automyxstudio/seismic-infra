services:

  # ---------------------------------------------------------------------------
  # MongoDB
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: seismic_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - seismic_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: seismic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - seismic_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # API REST (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ../seismic-backend
      dockerfile: Dockerfile
    container_name: seismic_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - seismic_net
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - parquet_data:/data/parquet
    environment:
      PARQUET_DATA_DIR: /data/parquet

  # ---------------------------------------------------------------------------
  # Servicio de Ingesta (loop cada 3 min)
  # ---------------------------------------------------------------------------
  ingesta:
    build:
      context: ../seismic-backend
      dockerfile: Dockerfile
    container_name: seismic_ingesta
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "src.services.ingestion_service"]
    networks:
      - seismic_net
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Airflow
  # ---------------------------------------------------------------------------
  airflow:
    image: apache/airflow:2.10.4-python3.12
    container_name: seismic_airflow
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      MONGO_URI: ${MONGO_URI}
      PYTHONPATH: /opt/seismic-backend
      PARQUET_DATA_DIR: /data/parquet
    ports:
      - "8080:8080"
    volumes:
      - ../seismic-backend/src/airflow/dags:/opt/airflow/dags
      - ../seismic-backend:/opt/seismic-backend
      - airflow_data:/opt/airflow
      - parquet_data:/data/parquet
    networks:
      - seismic_net
    depends_on:
      mongodb:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username $$AIRFLOW_ADMIN_USERNAME
          --password $$AIRFLOW_ADMIN_PASSWORD
          --firstname Admin --lastname User
          --role Admin --email $$AIRFLOW_ADMIN_EMAIL || true &&
        airflow scheduler &
        airflow webserver
      "

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: seismic_prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - seismic_net
    depends_on:
      - api

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.4.0
    container_name: seismic_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - seismic_net
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Frontend Angular
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../seismic-frontend
      dockerfile: Dockerfile
    container_name: seismic_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    networks:
      - seismic_net
    depends_on:
      api:
        condition: service_healthy

# -----------------------------------------------------------------------------
# Volúmenes persistentes
# -----------------------------------------------------------------------------
volumes:
  mongo_data:
  redis_data:
  airflow_data:
  prometheus_data:
  grafana_data:
  parquet_data:    # data lake analítico — compartido entre api y airflow

# -----------------------------------------------------------------------------
# Red interna — los servicios se comunican por nombre
# -----------------------------------------------------------------------------
networks:
  seismic_net:
    driver: bridge
